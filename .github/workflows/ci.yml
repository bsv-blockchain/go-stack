name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: packages/sdk/go-sdk/go.mod
          cache: true

      - name: Build all packages
        run: go build ./...

      - name: Test all packages
        run: go test ./...

  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: packages/sdk/go-sdk/go.mod
          cache: true

      - name: Vet all packages
        run: go vet ./...

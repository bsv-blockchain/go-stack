name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: packages/sdk/go-sdk/go.mod
          cache: true

      - name: Build all workspace modules
        run: |
          awk '/^use \(/,/^\)/ { if ($1 ~ /^\.\//) print $1 }' go.work | while read -r mod; do
            echo "==> go build in $mod"
            (
              cd "$mod"
              go list -f '{{if or .GoFiles .CgoFiles}}{{.ImportPath}}{{end}}' ./... \
                | grep -Ev '/magefiles(/|$)' \
                | xargs -r go build
            )
          done

      - name: Test all workspace modules
        run: |
          awk '/^use \(/,/^\)/ { if ($1 ~ /^\.\//) print $1 }' go.work | while read -r mod; do
            echo "==> go test in $mod"
            (cd "$mod" && go test ./...)
          done

  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: packages/sdk/go-sdk/go.mod
          cache: true

      - name: Vet all workspace modules
        run: |
          awk '/^use \(/,/^\)/ { if ($1 ~ /^\.\//) print $1 }' go.work | while read -r mod; do
            echo "==> go vet in $mod"
            (cd "$mod" && go vet ./...)
          done

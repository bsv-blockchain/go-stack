name: build

on: workflow_dispatch
#on:
#  push:
#    branches:
#      - master

permissions:
  contents: read
  packages: write

env:
  GOPRIVATE: github.com/teranode-group/*

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.WOC_DOCKER_PUBLISHER_APP_ID }}
          private-key: ${{ secrets.WOC_DOCKER_PUBLISHER_APP_PRIVATE_KEY }}
          owner: teranode-group

      - run: |
          git config --global credential.helper store
          printf 'https://x-access-token:${{ steps.app-token.outputs.token }}@github.com\n' > ~/.git-credentials
          git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf https://github.com/

      - run: make build

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - run: |
          IMAGE=ghcr.io/${{ github.repository }}:latest
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

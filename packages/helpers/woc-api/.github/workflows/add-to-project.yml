name: Add to Project
on:
  issues:
    types: [opened, reopened]
  pull_request:
    types: [opened, reopened]
jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v0.5.0
        with:
          project-url: https://github.com/orgs/bsv-blockchain-woc/projects/2
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSV Media | Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Media Marketplace</h1>
            <p class="subtitle">Different types of media fetch different prices.</p>
        </header>

        <ul class="article-list">
            <li>
                <a href="/media/photo.jpg" class="article-card">
                    <span class="article-title">Premium Photo</span>
                    <span class="badge photo">50 Sats</span>
                </a>
            </li>
            <li>
                <a href="/media/music.mp3" class="article-card">
                    <span class="article-title">Premium Music</span>
                    <span class="badge music">200 Sats</span>
                </a>
            </li>
            <li>
                <a href="/media/video.mp4" class="article-card">
                    <span class="article-title">Premium Video</span>
                    <span class="badge video">500 Sats</span>
                </a>
            </li>
        </ul>
    </div>
</body>
</html>

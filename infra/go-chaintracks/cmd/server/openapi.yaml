openapi: 3.0.3
info:
  title: Chaintracks Server API
  description: |
    REST API for querying Bitcoin SV blockchain headers.

    ## Services
    - **API Server** (port 3011): Real-time header queries and streaming
    - **CDN Server** (port 3012): Static header files for bootstrap (optional)

    ## CDN Bootstrap Format
    The CDN serves static header files compatible with the TypeScript chaintracks-server CDN format:
    - `{network}NetBlockHeaders.json` - Metadata with file list
    - `{network}Net_X.headers` - Binary header files (100k headers × 80 bytes = ~8MB each)

    Where `{network}` is `main` or `test`.
  version: 2.0.0
servers:
  - url: /
    description: API Server (default port 3011)
tags:
  - name: v2
    description: Modern v2 API endpoints
  - name: Legacy
    description: Legacy v1 endpoints for backwards compatibility
  - name: CDN
    description: CDN static file server endpoints (port 3012, when enabled)
paths:
  /v2/network:
    get:
      summary: Get blockchain network
      description: Returns the network name (main or test)
      tags:
        - v2
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      value:
                        type: string

  /v2/tip:
    get:
      summary: Get chain tip header
      description: Returns the full header of the current chain tip
      tags:
        - v2
      responses:
        '200':
          description: Successful response
          headers:
            Cache-Control:
              schema:
                type: string
              description: Cache control header (no-cache)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      value:
                        $ref: '#/components/schemas/BlockHeader'
        '404':
          description: Chain tip not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v2/tip/stream:
    get:
      summary: Subscribe to tip updates (SSE)
      description: Server-Sent Events stream for real-time chain tip updates
      tags:
        - v2
      responses:
        '200':
          description: SSE stream of tip updates
          content:
            text/event-stream:
              schema:
                type: string
                description: JSON-encoded BlockHeader objects

  /v2/tip.bin:
    get:
      summary: Get chain tip as binary
      description: Returns the chain tip as 80-byte binary data
      tags:
        - v2
      responses:
        '200':
          description: Binary header data
          headers:
            Cache-Control:
              schema:
                type: string
              description: Cache control header (no-cache)
            X-Block-Height:
              schema:
                type: integer
              description: Block height
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Chain tip not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v2/header/height/{height}:
    get:
      summary: Get header by height
      description: Returns a block header for a specific height
      tags:
        - v2
      parameters:
        - name: height
          in: path
          required: true
          schema:
            type: integer
            format: uint32
          description: Block height
      responses:
        '200':
          description: Successful response
          headers:
            Cache-Control:
              schema:
                type: string
              description: Cache control header (varies based on height)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      value:
                        $ref: '#/components/schemas/BlockHeader'
        '400':
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Header not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v2/header/height/{height}.bin:
    get:
      summary: Get header by height as binary
      description: Returns a block header as 80-byte binary data
      tags:
        - v2
      parameters:
        - name: height
          in: path
          required: true
          schema:
            type: integer
            format: uint32
          description: Block height
      responses:
        '200':
          description: Binary header data
          headers:
            Cache-Control:
              schema:
                type: string
              description: Cache control header (varies based on height)
            X-Block-Height:
              schema:
                type: integer
              description: Block height
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Header not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v2/header/hash/{hash}:
    get:
      summary: Get header by hash
      description: Returns a block header for a specific block hash
      tags:
        - v2
      parameters:
        - name: hash
          in: path
          required: true
          schema:
            type: string
          description: Block hash (hex string)
      responses:
        '200':
          description: Successful response
          headers:
            Cache-Control:
              schema:
                type: string
              description: Cache control header (varies based on height)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      value:
                        $ref: '#/components/schemas/BlockHeader'
        '400':
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Header not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v2/header/hash/{hash}.bin:
    get:
      summary: Get header by hash as binary
      description: Returns a block header as 80-byte binary data
      tags:
        - v2
      parameters:
        - name: hash
          in: path
          required: true
          schema:
            type: string
          description: Block hash (hex string)
      responses:
        '200':
          description: Binary header data
          headers:
            Cache-Control:
              schema:
                type: string
              description: Cache control header (varies based on height)
            X-Block-Height:
              schema:
                type: integer
              description: Block height
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Header not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v2/headers:
    get:
      summary: Get multiple headers
      description: Returns multiple block headers as binary (80 bytes each)
      tags:
        - v2
      parameters:
        - name: height
          in: query
          required: true
          schema:
            type: integer
            format: uint32
          description: Starting block height
        - name: count
          in: query
          required: true
          schema:
            type: integer
            format: uint32
          description: Number of headers to retrieve
      responses:
        '200':
          description: Binary header data
          headers:
            Cache-Control:
              schema:
                type: string
              description: Cache control header (varies based on height)
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
                description: Concatenated block headers (80 bytes per header)
        '400':
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v2/headers.bin:
    get:
      summary: Get multiple headers as binary
      description: Returns multiple block headers as binary with metadata headers
      tags:
        - v2
      parameters:
        - name: height
          in: query
          required: true
          schema:
            type: integer
            format: uint32
          description: Starting block height
        - name: count
          in: query
          required: true
          schema:
            type: integer
            format: uint32
          description: Number of headers to retrieve
      responses:
        '200':
          description: Binary header data
          headers:
            Cache-Control:
              schema:
                type: string
              description: Cache control header (varies based on height)
            X-Start-Height:
              schema:
                type: integer
              description: Starting block height
            X-Header-Count:
              schema:
                type: integer
              description: Number of headers returned
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
                description: Concatenated block headers (80 bytes per header)
        '400':
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Legacy v1 endpoints (RPC-style API for backwards compatibility)
  /getChain:
    get:
      summary: Get blockchain network (legacy)
      description: Legacy endpoint - Returns the network name
      tags:
        - Legacy
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacySuccessResponse'

  /getPresentHeight:
    get:
      summary: Get current height (legacy)
      description: Legacy endpoint - Returns the current blockchain height
      tags:
        - Legacy
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacySuccessResponse'

  /findChainTipHashHex:
    get:
      summary: Get chain tip hash (legacy)
      description: Legacy endpoint - Returns the chain tip hash
      tags:
        - Legacy
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacySuccessResponse'
        '404':
          description: Chain tip not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /findChainTipHeaderHex:
    get:
      summary: Get chain tip header (legacy)
      description: Legacy endpoint - Returns the chain tip header
      tags:
        - Legacy
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/LegacySuccessResponse'
                  - type: object
                    properties:
                      value:
                        $ref: '#/components/schemas/BlockHeader'
        '404':
          description: Chain tip not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /findHeaderHexForHeight:
    get:
      summary: Get header by height (legacy)
      description: Legacy endpoint - Returns a header by height
      tags:
        - Legacy
      parameters:
        - name: height
          in: query
          required: true
          schema:
            type: integer
            format: uint32
          description: Block height
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/LegacySuccessResponse'
                  - type: object
                    properties:
                      value:
                        $ref: '#/components/schemas/BlockHeader'
        '400':
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Header not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /findHeaderHexForBlockHash:
    get:
      summary: Get header by hash (legacy)
      description: Legacy endpoint - Returns a header by block hash
      tags:
        - Legacy
      parameters:
        - name: hash
          in: query
          required: true
          schema:
            type: string
          description: Block hash (hex string)
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/LegacySuccessResponse'
                  - type: object
                    properties:
                      value:
                        $ref: '#/components/schemas/BlockHeader'
        '400':
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Header not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /getHeaders:
    get:
      summary: Get multiple headers (legacy)
      description: Legacy endpoint - Returns multiple headers as hex string
      tags:
        - Legacy
      parameters:
        - name: height
          in: query
          required: true
          schema:
            type: integer
            format: uint32
          description: Starting block height
        - name: count
          in: query
          required: true
          schema:
            type: integer
            format: uint32
          description: Number of headers to retrieve
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/LegacySuccessResponse'
                  - type: object
                    properties:
                      value:
                        type: string
                        description: Concatenated headers as hex string
        '400':
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # CDN Server endpoints (port 3012, when enabled)
  # Note: These endpoints are served by a separate CDN server
  /{network}NetBlockHeaders.json:
    get:
      summary: CDN metadata file
      description: |
        Returns metadata JSON describing available header files.
        Served from CDN server (default port 3012).

        Example response:
        ```json
        {
          "rootFolder": "",
          "jsonFilename": "mainNetBlockHeaders.json",
          "headersPerFile": 100000,
          "files": [
            {
              "chain": "main",
              "count": 100000,
              "fileHash": "abc123...",
              "fileName": "mainNet_0.headers",
              "firstHeight": 0,
              "lastChainWork": "0x...",
              "lastHash": "000000...",
              "prevChainWork": "0x0",
              "prevHash": "000000...",
              "sourceUrl": "https://..."
            }
          ]
        }
        ```
      tags:
        - CDN
      parameters:
        - name: network
          in: path
          required: true
          schema:
            type: string
            enum: [main, test]
          description: Network name (main or test)
      responses:
        '200':
          description: CDN metadata
          headers:
            Cache-Control:
              schema:
                type: string
              description: no-cache (metadata should be fetched fresh)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CDNMetadata'
        '404':
          description: Metadata file not found

  /{network}Net_{index}.headers:
    get:
      summary: CDN header file
      description: |
        Returns binary header file containing up to 100,000 block headers.
        Each header is 80 bytes, so a full file is approximately 8MB.
        Served from CDN server (default port 3012).

        Supports HTTP Range requests for partial downloads.
      tags:
        - CDN
      parameters:
        - name: network
          in: path
          required: true
          schema:
            type: string
            enum: [main, test]
          description: Network name (main or test)
        - name: index
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
          description: File index (0-based). File 0 contains headers 0-99999, file 1 contains 100000-199999, etc.
      responses:
        '200':
          description: Binary header data
          headers:
            Cache-Control:
              schema:
                type: string
              description: public, max-age=3600 (immutable historical data)
            Accept-Ranges:
              schema:
                type: string
              description: bytes (supports Range requests)
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
                description: Concatenated block headers (80 bytes per header, up to 100k headers)
        '206':
          description: Partial content (when Range header is used)
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Header file not found

  /health:
    get:
      summary: CDN health check
      description: |
        Health check endpoint for the CDN server.
        Served from CDN server (default port 3012).
      tags:
        - CDN
      responses:
        '200':
          description: CDN server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: cdn

components:
  schemas:
    SuccessResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [success]
        value:
          description: Response payload (varies by endpoint)

    LegacySuccessResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [success]
        value:
          description: Response payload (varies by endpoint)

    ErrorResponse:
      type: object
      required:
        - status
        - code
        - description
      properties:
        status:
          type: string
          enum: [error]
        code:
          type: string
        description:
          type: string

    BlockHeader:
      type: object
      required:
        - version
        - previousHash
        - merkleRoot
        - time
        - bits
        - nonce
        - height
        - hash
      properties:
        version:
          type: integer
          format: int32
          description: Block version
        previousHash:
          type: string
          description: Previous block hash
        merkleRoot:
          type: string
          description: Merkle root hash
        time:
          type: integer
          format: uint32
          description: Block timestamp (Unix time)
        bits:
          type: integer
          format: uint32
          description: Difficulty target
        nonce:
          type: integer
          format: uint32
          description: Nonce
        height:
          type: integer
          format: uint32
          description: Block height in the chain
        hash:
          type: string
          description: Block hash

    CDNMetadata:
      type: object
      required:
        - rootFolder
        - jsonFilename
        - headersPerFile
        - files
      properties:
        rootFolder:
          type: string
          description: Root folder path for header files
          example: ""
        jsonFilename:
          type: string
          description: Name of this metadata JSON file
          example: "mainNetBlockHeaders.json"
        headersPerFile:
          type: integer
          description: Number of headers per binary file (typically 100000)
          example: 100000
        files:
          type: array
          items:
            $ref: '#/components/schemas/CDNFileEntry'
          description: List of available header files with metadata

    CDNFileEntry:
      type: object
      required:
        - chain
        - count
        - fileHash
        - fileName
        - firstHeight
        - lastChainWork
        - lastHash
        - prevChainWork
        - prevHash
        - sourceUrl
      properties:
        chain:
          type: string
          description: Network name (main or test)
          example: "main"
        count:
          type: integer
          description: Number of headers in this file
          example: 100000
        fileHash:
          type: string
          description: SHA256 hash of the file contents
        fileName:
          type: string
          description: Name of the binary header file
          example: "mainNet_0.headers"
        firstHeight:
          type: integer
          format: uint32
          description: Height of the first header in this file
          example: 0
        lastChainWork:
          type: string
          description: Cumulative chainwork at the last header (hex string)
        lastHash:
          type: string
          description: Hash of the last header in this file
        prevChainWork:
          type: string
          description: Cumulative chainwork before the first header (hex string)
        prevHash:
          type: string
          description: Hash of the block before the first header in this file
        sourceUrl:
          type: string
          description: URL where this file can be downloaded
          example: "https://chaintracks-cdn-us-1.bsvb.tech/mainNet_0.headers"

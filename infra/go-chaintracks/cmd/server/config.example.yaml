# Chaintracks Server Configuration
# Environment variables can override any setting using CHAINTRACKS_ prefix
# Example: CHAINTRACKS_PORT=8080 overrides port

# HTTP API server port
port: 3011

# CDN static file server
cdn_enabled: false # Enable CDN server for static header files
cdn_port: 3012 # CDN server port (same as TypeScript)

chaintracks:
  # Mode: "embedded" runs chainmanager locally, "remote" connects to a chaintracks server
  mode: embedded

  # Storage path for blockchain data (embedded mode)
  storage_path: ~/.chaintracks

  # Remote server URL (required for remote mode)
  # url: http://localhost:3011

  # Bootstrap configuration for initial header sync (embedded mode)
  #
  # CDN-style bootstrap (TypeScript CDN format):
  # bootstrap_url: https://chaintracks-cdn-us-1.bsvb.tech
  # bootstrap_mode: cdn
  #
  # API-style bootstrap (gorillanode format):
  # bootstrap_url: https://mainnet.gorillanode.io/api/v1
  # bootstrap_mode: api
